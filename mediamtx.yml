# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Disable unused
rtsp: no
webrtc: no
srt: no

# Accept any path — notify arobase-live when stream stops
paths:
  all_others:
    source: publisher
    sourceOnDemand: no
    runOnDemandCloseAfter: 5s
    runOnUnDemand:
    runOnReaderConnect:
    runOnReaderDisconnect:
    runOnRead:
    runOnUnread:
    runOnReady:
    runOnNotReady: "wget -q -O /dev/null --post-data='{\"event\":\"disconnect\",\"path\":\"$MTX_PATH\"}' --header='Content-Type: application/json' http://arobase-live.railway.internal:3000/api/stream/event || true"
