# MediaMTX Configuration for ARObase LIVE

# Logging
logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS server
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsVariant: lowLatency

# RTMP on port 1935 (via Railway TCP Proxy for OBS)
rtmp: yes
rtmpAddress: :1935

# Disable unused
rtsp: no
webrtc: no
srt: no

# Accept all paths
paths:
  all_others:
