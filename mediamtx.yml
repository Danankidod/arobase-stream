# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8889
hlsAllowOrigin: '*'
hlsVariant: mpegts
# 8 × 1s = 8s buffer kept on the server. The previous 3 × 1s = 3s buffer caused
# viewers to freeze whenever their player drifted >3s behind — every recovered
# network hiccup made the player request segments MediaMTX had already deleted,
# producing seg14.ts/seg17.ts 404s and a stuck video. 8s is the standard
# tradeoff: low enough to stay near-live, large enough to absorb routine
# packet jitter without 404s.
hlsSegmentCount: 8
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Playback — serve recorded streams for replay
playback: yes
playbackAddress: :9998


# Disable unused
rtsp: no
webrtc: no
srt: no

# Recording — save all streams as MP4 for replay
# Keep 7 days so viewers can still pre-order from replays after a show.
# At ~1.5 GB per show × 1-2 shows/week, we stay well under the 5 GB volume cap.
# start.sh has a safety net that purges oldest files first if usage > 80%.
record: yes
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S_%f
recordFormat: fmp4
recordSegmentDuration: 60m
recordDeleteAfter: 168h

# Accept any path
paths:
  all_others:
    source: publisher
    # Notify backend when stream starts
    runOnReady: >
      wget -q -O /dev/null --post-data '{"event":"ready","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
    # Notify backend when stream stops → triggers replay
    runOnNotReady: >
      wget -q -O /dev/null --post-data '{"event":"disconnect","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
