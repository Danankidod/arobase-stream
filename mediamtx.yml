# MediaMTX Configuration for ARObase LIVE
# All traffic on a single HTTP port (Railway compatible)

# Logging
logLevel: info
logDestinations: [stdout]

# API — same port as everything else
api: yes
apiAddress: :8888

# WebRTC — needed for WHIP ingestion from OBS
webrtc: yes
webrtcAddress: :8888

# HLS server — frontend reads from here
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsVariant: lowLatency

# Disable protocols that need dedicated TCP ports (not Railway compatible)
rtmp: no
rtsp: no
srt: no

# Paths — accept any stream key under /live/
paths:
  live~:
    source: publisher
