# MediaMTX Configuration for ARObase LIVE

logLevel: debug
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output — standard variant for max compatibility
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Disable unused
rtsp: no
webrtc: no
srt: no

# Accept any path
paths:
  all_others:
    source: publisher
    sourceOnDemand: no
