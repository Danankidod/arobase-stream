# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Disable unused
rtsp: no
webrtc: no
srt: no

# Recording — save all streams as MP4 for replay
record: yes
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
recordFormat: fmp4
recordSegmentDuration: 60m
recordDeleteAfter: 720h

# Accept any path
paths:
  all_others:
    source: publisher
