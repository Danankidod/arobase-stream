# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Playback — serve recorded streams for replay (internal, proxied by backend)
playback: yes
playbackAddress: :9998

# Disable unused
rtsp: no
webrtc: no
srt: no

# Recording — save all streams as MP4 for replay
record: yes
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
recordFormat: fmp4
recordSegmentDuration: 60m
recordDeleteAfter: 720h

# Accept any path
paths:
  all_others:
    source: publisher
    # Notify backend when stream starts
    runOnReady: >
      wget -q -O /dev/null --post-data '{"event":"ready","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
    # Notify backend when stream stops → triggers replay
    runOnNotReady: >
      wget -q -O /dev/null --post-data '{"event":"disconnect","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
