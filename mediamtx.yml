# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8889
hlsAllowOrigin: '*'
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s

# RTMP input
rtmp: yes
rtmpAddress: :1935

# Playback — serve recorded streams for replay
playback: yes
playbackAddress: :9998


# Disable unused
rtsp: no
webrtc: no
srt: no

# Recording — save all streams as MP4 for replay
# recordDeleteAfter reduced from 720h (30 days) to 24h: the 5 GB volume was
# filling up at 94% (4.7 GB) because every test live created a 1-2 GB MP4 that
# stayed for a month. 24h covers replay-after-show needs without bloating disk.
record: yes
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S_%f
recordFormat: fmp4
recordSegmentDuration: 60m
recordDeleteAfter: 24h

# Accept any path
paths:
  all_others:
    source: publisher
    # Notify backend when stream starts
    runOnReady: >
      wget -q -O /dev/null --post-data '{"event":"ready","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
    # Notify backend when stream stops → triggers replay
    runOnNotReady: >
      wget -q -O /dev/null --post-data '{"event":"disconnect","path":"$MTX_PATH"}'
      --header='Content-Type: application/json'
      --header='x-stream-secret: arobase_stream_webhook_2026'
      'https://www.arobase-live.com/api/stream/event' || true
