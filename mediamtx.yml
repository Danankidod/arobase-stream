# MediaMTX Configuration for ARObase LIVE
# Single port HTTP server for Railway

# Logging
logLevel: info
logDestinations: [stdout]

# HLS server — the only public-facing protocol (port 8888)
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsVariant: lowLatency

# RTMP on internal port (for OBS via TCP Proxy)
rtmp: yes
rtmpAddress: :1935

# API on separate internal port
api: yes
apiAddress: :9997

# Disable unused protocols
rtsp: no
webrtc: no
srt: no

# Paths — accept any stream key
paths:
  all_others:
    source: publisher
