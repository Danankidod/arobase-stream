# MediaMTX Configuration for ARObase LIVE

logLevel: info
logDestinations: [stdout]

# API
api: yes
apiAddress: :9997

# HLS output
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsVariant: lowLatency

# RTMP input (via Railway TCP Proxy)
rtmp: yes
rtmpAddress: :1935

# Disable unused
rtsp: no
webrtc: no
srt: no

# Accept any path
paths:
  all_others:
    source: publisher
    sourceOnDemand: no
