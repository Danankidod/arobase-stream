worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8888;

        # CORS headers handled per-location to avoid duplicates with upstream

        # Replay recordings — serve fMP4 files directly
        location /playback/ {
            alias /recordings/;
            autoindex on;
            autoindex_format json;
            types {
                video/mp4 mp4 m4s;
                application/mp4 fmp4;
                text/plain txt;
            }
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "public, max-age=86400";
        }

        # Playback server (MediaMTX built-in replay API)
        location /replay/ {
            proxy_pass http://127.0.0.1:9998/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        }

        # HLS live streams — proxy to MediaMTX
        location / {
            proxy_pass http://127.0.0.1:8889;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
